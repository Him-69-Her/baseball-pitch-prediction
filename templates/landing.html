<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TINY-HUB ENERGY // Peer-to-Peer Energy Grid</title>
<meta name="description" content="Physics-aware, deterministic spatial matching engine for peer-to-peer electricity trading. Neighbors trading power, settled on-chain.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Monoton&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000;
    --cyan:#00f0ff;
    --cyan-dim:#00b8c7;
    --magenta:#ff2d95;
    --sun-1:#ffcc00;
    --sun-2:#ff9500;
    --sun-3:#ff5500;
    --sun-4:#c72c00;
    --ink:#e6f8ff;
    --ink-dim:#7ba9b3;
  }

  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:var(--bg);color:var(--ink);font-family:'JetBrains Mono',monospace;overflow-x:hidden}

  /* ─── CRT SCANLINES overlay ─────────────────────────────── */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:999;
    background:repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.18) 3px,
      rgba(0,0,0,0) 4px
    );
    mix-blend-mode:multiply;
  }
  /* (VHS noise removed for cleaner texture) */

  /* ─── NAV ───────────────────────────────────────────────── */
  nav{
    position:fixed;top:0;left:0;right:0;z-index:50;
    display:flex;justify-content:space-between;align-items:center;
    padding:1.2rem 2rem;
    background:linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
    border-bottom:1px solid rgba(0,240,255,0.15);
  }
  .logo{
    font-family:'Monoton',cursive;font-size:1.6rem;letter-spacing:.15em;
    color:var(--sun-1);
    text-shadow:0 0 8px var(--sun-2),0 0 24px var(--sun-3);
  }
  .nav-links{display:flex;gap:1.4rem;list-style:none;flex-wrap:wrap;justify-content:flex-end}
  .nav-links a{
    color:var(--cyan);text-decoration:none;font-size:.7rem;letter-spacing:.18em;
    text-transform:uppercase;transition:all .2s;
    text-shadow:0 0 4px var(--cyan-dim);white-space:nowrap;
  }
  .nav-links a:hover{color:var(--magenta);text-shadow:0 0 8px var(--magenta)}

  /* ─── HERO ──────────────────────────────────────────────── */
  .hero{
    position:relative;height:100vh;min-height:640px;overflow:hidden;
    display:flex;flex-direction:column;align-items:center;
  }

  /* Perspective grid floor */
  /* Perspective wrapper keeps the grid pinned to the bottom */
  .grid-wrap{
    position:absolute;bottom:0;left:0;right:0;height:50vh;
    perspective:400px;perspective-origin:50% 0%;
    z-index:2;pointer-events:none;
    overflow:hidden;
  }
  .grid-floor{
    position:absolute;bottom:0;left:-50%;width:200%;height:100%;
    background-image:
      linear-gradient(to right, var(--cyan) 2px, transparent 2px),
      linear-gradient(to bottom, var(--cyan) 2px, transparent 2px);
    background-size:80px 80px;
    background-position:0 0;
    transform:rotateX(70deg);
    transform-origin:50% 100%;
    animation:grid-scroll 6s linear infinite;
    filter:drop-shadow(0 0 6px var(--cyan)) drop-shadow(0 0 14px var(--cyan-dim));
    opacity:.95;
  }
  @keyframes grid-scroll{
    0%{background-position:0 0}
    100%{background-position:0 80px}
  }
  /* Fade the far end of the grid into black (horizon haze) */
  .grid-mask{
    position:absolute;bottom:0;left:0;right:0;height:50vh;pointer-events:none;z-index:3;
    background:linear-gradient(to top, transparent 0%, transparent 30%, rgba(0,0,0,0.55) 70%, #000 100%);
  }
  /* Neon horizon line sitting on top of the grid */
  .horizon{
    position:absolute;bottom:50vh;left:0;right:0;height:2px;z-index:4;
    background:linear-gradient(to right, transparent, var(--cyan) 15%, var(--cyan) 85%, transparent);
    box-shadow:0 0 12px var(--cyan), 0 0 32px var(--cyan), 0 0 60px var(--cyan-dim);
  }

  /* Half-sun — SVG-rendered hero */
  .sun-wrap{
    position:absolute;bottom:50vh;left:50%;transform:translateX(-50%);
    width:min(560px,55vw);aspect-ratio:2/1;
    z-index:3;pointer-events:none;
  }
  .sun-wrap svg{width:100%;height:100%;display:block;overflow:visible}
  .sun-glow{
    position:absolute;inset:-60% -30% 0 -30%;
    background:radial-gradient(ellipse at 50% 100%,
      rgba(255,149,0,0.55) 0%,
      rgba(255,85,0,0.25) 25%,
      transparent 60%);
    filter:blur(10px);z-index:-1;pointer-events:none;
    animation:sun-pulse 4s ease-in-out infinite;
  }
  .sun-haze{
    position:absolute;bottom:-2px;left:-15%;right:-15%;height:40%;
    background:linear-gradient(to top,rgba(255,149,0,0.35),transparent);
    filter:blur(8px);z-index:2;pointer-events:none;
  }
  @keyframes sun-pulse{
    0%,100%{opacity:.85;transform:scale(1)}
    50%{opacity:1;transform:scale(1.03)}
  }
50%{filter:drop-shadow(0 -15px 60px var(--sun-1)) drop-shadow(0 -25px 120px var(--sun-2))}
  }

  .hero{
    justify-content:flex-start;
    padding:0;
  }
  /* Position wordmark BELOW horizon, in dark band above grid */
  .hero-content{
    position:absolute;left:50%;
    bottom:34vh;
    transform:translateX(-50%);
    z-index:6;text-align:center;
    width:100%;
  }
  .wordmark{
    font-family:'Monoton',cursive;
    font-size:clamp(1.8rem,5.2vw,4rem);
    letter-spacing:.14em;line-height:1;
    color:var(--sun-1);
    text-shadow:
      0 0 12px var(--sun-2),
      0 0 28px var(--sun-3),
      0 2px 0 rgba(0,0,0,0.6);
    animation:flicker 5s infinite;
    white-space:nowrap;
  }
  @keyframes flicker{
    0%,18%,22%,25%,53%,57%,100%{opacity:1}
    20%,24%,55%{opacity:.82}
  }
  .tagline{
    margin-top:1rem;font-size:clamp(.7rem,1vw,.85rem);letter-spacing:.4em;
    color:var(--cyan);text-transform:uppercase;
    text-shadow:0 0 6px var(--cyan-dim);
  }
  .subline{
    margin-top:.6rem;font-size:clamp(.85rem,1.3vw,1.05rem);
    color:var(--ink-dim);max-width:640px;margin-left:auto;margin-right:auto;
    line-height:1.5;
  }

  .cta-row{
    margin-top:2.4rem;display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;
  }
  .btn{
    display:inline-block;padding:1rem 1.8rem;
    font-family:'JetBrains Mono',monospace;font-size:.78rem;font-weight:700;
    letter-spacing:.22em;text-transform:uppercase;text-decoration:none;
    border:1px solid var(--cyan);color:var(--cyan);background:rgba(0,240,255,0.04);
    transition:all .25s;position:relative;overflow:hidden;
    text-shadow:0 0 4px var(--cyan-dim);
  }
  .btn:hover{
    background:var(--cyan);color:#000;text-shadow:none;
    box-shadow:0 0 24px var(--cyan),0 0 48px var(--cyan-dim);
    transform:translateY(-2px);
  }
  .btn.primary{border-color:var(--sun-1);color:var(--sun-1);text-shadow:0 0 4px var(--sun-2)}
  .btn.primary:hover{background:var(--sun-1);color:#000;box-shadow:0 0 24px var(--sun-2),0 0 48px var(--sun-3)}

  /* ─── STATS STRIP ───────────────────────────────────────── */
  .stats{
    position:relative;z-index:5;
    display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:0;border-top:1px solid rgba(0,240,255,0.2);border-bottom:1px solid rgba(0,240,255,0.2);
    background:linear-gradient(90deg,transparent,rgba(0,240,255,0.04),transparent);
  }
  .stat{
    padding:2rem 1.5rem;text-align:center;
    border-right:1px solid rgba(0,240,255,0.1);
  }
  .stat:last-child{border-right:none}
  .stat-num{
    font-family:'Monoton',cursive;font-size:clamp(1.8rem,3.5vw,2.8rem);
    color:var(--sun-1);text-shadow:0 0 10px var(--sun-2);letter-spacing:.05em;
  }
  .stat-label{
    margin-top:.4rem;font-size:.68rem;letter-spacing:.25em;text-transform:uppercase;
    color:var(--cyan-dim);
  }

  /* ─── SECTIONS ──────────────────────────────────────────── */
  section{padding:6rem 2rem;position:relative;z-index:2}
  .container{max-width:1200px;margin:0 auto}

  .section-head{margin-bottom:3rem}
  .section-eyebrow{
    font-size:.7rem;letter-spacing:.35em;color:var(--magenta);text-transform:uppercase;
    text-shadow:0 0 6px var(--magenta);margin-bottom:.8rem;
  }
  .section-title{
    font-family:'Monoton',cursive;font-size:clamp(1.8rem,4vw,3rem);
    letter-spacing:.05em;color:var(--cyan);
    text-shadow:0 0 12px var(--cyan-dim);
  }

  .how-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem}
  .how-card{
    border:1px solid rgba(0,240,255,0.25);padding:2rem;
    background:linear-gradient(135deg,rgba(0,240,255,0.03),rgba(255,45,149,0.02));
    position:relative;transition:all .3s;
  }
  .how-card::before{
    content:"";position:absolute;top:-1px;left:-1px;width:20px;height:20px;
    border-top:2px solid var(--sun-1);border-left:2px solid var(--sun-1);
  }
  .how-card::after{
    content:"";position:absolute;bottom:-1px;right:-1px;width:20px;height:20px;
    border-bottom:2px solid var(--sun-1);border-right:2px solid var(--sun-1);
  }
  .how-card:hover{border-color:var(--cyan);box-shadow:0 0 20px rgba(0,240,255,0.3);transform:translateY(-4px)}
  .how-num{
    font-family:'Monoton',cursive;font-size:2.4rem;color:var(--sun-2);
    text-shadow:0 0 10px var(--sun-3);margin-bottom:.8rem;
  }
  .how-title{font-size:1.1rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.8rem;color:var(--ink)}
  .how-body{font-size:.88rem;line-height:1.6;color:var(--ink-dim)}

  /* Thesis split section */
  .thesis{
    display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center;
  }
  @media (max-width:768px){.thesis{grid-template-columns:1fr}}
  .thesis-body p{margin-bottom:1.2rem;line-height:1.7;color:var(--ink)}
  .thesis-body strong{color:var(--cyan);text-shadow:0 0 4px var(--cyan-dim)}
  .thesis-visual{
    aspect-ratio:1/1;border:1px solid var(--cyan-dim);
    background:
      repeating-linear-gradient(0deg,transparent,transparent 18px,rgba(0,240,255,0.1) 19px),
      repeating-linear-gradient(90deg,transparent,transparent 18px,rgba(0,240,255,0.1) 19px),
      radial-gradient(circle at center, rgba(255,149,0,0.4), transparent 50%);
    position:relative;
  }
  .thesis-visual::after{
    content:"PHYSICS-AWARE / DETERMINISTIC / SPATIAL";
    position:absolute;bottom:1rem;left:1rem;right:1rem;text-align:center;
    font-size:.65rem;letter-spacing:.3em;color:var(--sun-1);
  }

  /* Pilot callout */
  .pilot{
    border:1px solid var(--magenta);padding:3rem 2rem;text-align:center;
    background:radial-gradient(ellipse at center,rgba(255,45,149,0.08),transparent);
    position:relative;
  }
  .pilot-label{font-size:.7rem;letter-spacing:.35em;color:var(--magenta);text-transform:uppercase;text-shadow:0 0 6px var(--magenta)}
  .pilot-title{font-family:'Monoton',cursive;font-size:clamp(1.6rem,3.5vw,2.6rem);color:var(--sun-1);margin:.8rem 0;text-shadow:0 0 12px var(--sun-2)}
  .pilot-body{color:var(--ink-dim);max-width:640px;margin:0 auto 1.5rem}

  /* ─── FOOTER ────────────────────────────────────────────── */
  footer{
    padding:3rem 2rem 2rem;border-top:1px solid rgba(0,240,255,0.15);
    display:grid;grid-template-columns:1fr auto;gap:1rem;align-items:center;
    font-size:.7rem;letter-spacing:.15em;color:var(--ink-dim);text-transform:uppercase;
  }
  footer .brand{color:var(--sun-2)}
  @media (max-width:600px){footer{grid-template-columns:1fr;text-align:center}}

  /* Disclaimer callout inline */
  .disclaimer{
    display:inline-block;padding:.3rem .7rem;border:1px dashed var(--ink-dim);
    font-size:.62rem;letter-spacing:.2em;color:var(--ink-dim);margin-top:1rem;
  }

  /* Reveal on scroll */
  .reveal{opacity:0;transform:translateY(20px);transition:opacity .8s,transform .8s}
  .reveal.in{opacity:1;transform:translateY(0)}
</style>
</head>
<body>

<nav>
  <div class="logo">TINY·HUB</div>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#how">How It Works</a></li>
    <li><a href="#suppliers">Suppliers</a></li>
    <li><a href="#consumers">Consumers</a></li>
    <li><a href="#investors">Investors</a></li>
    <li><a href="/dashboard">Live Demo →</a></li>
  </ul>
</nav>

<section class="hero">
  <div class="sun-wrap">
    <div class="sun-glow"></div>
    <svg viewBox="0 0 200 100" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <linearGradient id="sunBands" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ffe54a"/>
          <stop offset="30%" stop-color="#ffcc00"/>
          <stop offset="60%" stop-color="#ff9500"/>
          <stop offset="85%" stop-color="#ff5500"/>
          <stop offset="100%" stop-color="#c72c00"/>
        </linearGradient>
        <clipPath id="domeClip">
          <path d="M 0,100 A 100,100 0 0 1 200,100 Z"/>
        </clipPath>
        <pattern id="sunScan" width="1" height="2" patternUnits="userSpaceOnUse">
          <rect width="1" height="1" fill="rgba(0,0,0,0.18)"/>
        </pattern>
      </defs>
      <g clip-path="url(#domeClip)">
        <rect x="0" y="0" width="200" height="100" fill="url(#sunBands)"/>
        <rect x="0" y="18" width="200" height="2.5" fill="#000"/>
        <rect x="0" y="36" width="200" height="2.5" fill="#000"/>
        <rect x="0" y="52" width="200" height="3" fill="#000"/>
        <rect x="0" y="68" width="200" height="3.5" fill="#000"/>
        <rect x="0" y="84" width="200" height="4" fill="#000"/>
        <rect x="0" y="0" width="200" height="100" fill="url(#sunScan)" opacity="0.35"/>
      </g>
    </svg>
    <div class="sun-haze"></div>
  </div>
  <div class="horizon"></div>
  <div class="grid-wrap"><div class="grid-floor"></div></div>
  <div class="grid-mask"></div>

  <div class="hero-content">
    <h1 class="wordmark">TINY&nbsp;HUB&nbsp;ENERGY</h1>
  </div>
</section>




</body>
</html>
