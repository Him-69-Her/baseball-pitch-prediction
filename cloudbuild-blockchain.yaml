steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'Dockerfile.settler', '-t', 'us-central1-docker.pkg.dev/tinyhub-blockchain-dev/blockchain-services/batch-settler:$COMMIT_SHA', '-t', 'us-central1-docker.pkg.dev/tinyhub-blockchain-dev/blockchain-services/batch-settler:latest', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/tinyhub-blockchain-dev/blockchain-services/batch-settler:$COMMIT_SHA']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/tinyhub-blockchain-dev/blockchain-services/batch-settler:latest']
  - name: 'gcr.io/cloud-builders/gcloud'
    args: ['run', 'deploy', 'batch-settler', '--image', 'us-central1-docker.pkg.dev/tinyhub-blockchain-dev/blockchain-services/batch-settler:$COMMIT_SHA', '--region', 'us-central1', '--project', 'tinyhub-blockchain-dev']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'Dockerfile.bridge', '-t', 'us-central1-docker.pkg.dev/tinyhub-blockchain-dev/blockchain-services/d91-bridge:$COMMIT_SHA', '-t', 'us-central1-docker.pkg.dev/tinyhub-blockchain-dev/blockchain-services/d91-bridge:latest', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/tinyhub-blockchain-dev/blockchain-services/d91-bridge:$COMMIT_SHA']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/tinyhub-blockchain-dev/blockchain-services/d91-bridge:latest']
  - name: 'gcr.io/cloud-builders/gcloud'
    args: ['run', 'deploy', 'd91-bridge', '--image', 'us-central1-docker.pkg.dev/tinyhub-blockchain-dev/blockchain-services/d91-bridge:$COMMIT_SHA', '--region', 'us-central1', '--project', 'tinyhub-blockchain-dev']
options:
  logging: CLOUD_LOGGING_ONLY
