steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'Dockerfile.d91-marketplace', '-t', 'us-central1-docker.pkg.dev/tinyhub-data-dev/data-services/d91-marketplace:$COMMIT_SHA', '-t', 'us-central1-docker.pkg.dev/tinyhub-data-dev/data-services/d91-marketplace:latest', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/tinyhub-data-dev/data-services/d91-marketplace:$COMMIT_SHA']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/tinyhub-data-dev/data-services/d91-marketplace:latest']
  - name: 'gcr.io/cloud-builders/gcloud'
    args: ['run', 'deploy', 'd91-marketplace', '--image', 'us-central1-docker.pkg.dev/tinyhub-data-dev/data-services/d91-marketplace:$COMMIT_SHA', '--region', 'us-central1', '--project', 'tinyhub-data-dev']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'Dockerfile.d63-marketplace', '-t', 'us-central1-docker.pkg.dev/tinyhub-data-dev/data-services/d63-marketplace:$COMMIT_SHA', '-t', 'us-central1-docker.pkg.dev/tinyhub-data-dev/data-services/d63-marketplace:latest', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/tinyhub-data-dev/data-services/d63-marketplace:$COMMIT_SHA']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/tinyhub-data-dev/data-services/d63-marketplace:latest']
  - name: 'gcr.io/cloud-builders/gcloud'
    args: ['run', 'deploy', 'd63-marketplace', '--image', 'us-central1-docker.pkg.dev/tinyhub-data-dev/data-services/d63-marketplace:$COMMIT_SHA', '--region', 'us-central1', '--project', 'tinyhub-data-dev']
options:
  logging: CLOUD_LOGGING_ONLY
