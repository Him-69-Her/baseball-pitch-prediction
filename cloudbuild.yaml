steps:
  # Build the platform image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/tinyhub-platform-dev/cloud-run-source-deploy/tinyhub-dashboard:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/tinyhub-platform-dev/cloud-run-source-deploy/tinyhub-dashboard:latest'
      - '.'

  # Push the image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/tinyhub-platform-dev/cloud-run-source-deploy/tinyhub-dashboard:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/tinyhub-platform-dev/cloud-run-source-deploy/tinyhub-dashboard:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'tinyhub-dashboard'
      - '--image'
      - 'us-central1-docker.pkg.dev/tinyhub-platform-dev/cloud-run-source-deploy/tinyhub-dashboard:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--port'
      - '5000'
      - '--memory'
      - '512Mi'
      - '--project'
      - 'tinyhub-platform-dev'

options:
  logging: CLOUD_LOGGING_ONLY
